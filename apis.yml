aid: goguardian
url: https://raw.githubusercontent.com/api-evangelist/goguardian/refs/heads/main/apis.yml
name: GoGuardian
kind: company
description: GoGuardian is a K-12 education technology company whose suite - Admin
  (DNS and device content filtering for CIPA compliance), Teacher (classroom
  management and student engagement), and Beacon (student safety and self-harm /
  suicide risk detection) - is administered through web dashboards rather than a
  broadly published public API. GoGuardian's integration model is primarily
  roster ingestion - it syncs organizations, students, teachers, guardians, and
  classes from district Student Information Systems via the IMS Global / 1EdTech
  OneRoster 1.1 REST API (using a Consumer ID / Secret and a OneRoster URL),
  Clever, ClassLink, and Google Classroom, and it consumes Google Workspace admin
  APIs on the district's behalf. A developer / partner documentation portal exists
  at based.goguardian.com ("GoGuardian Based Docs"), but GoGuardian's own outbound
  developer API surface is partner-gated and not openly published. The API entries
  below are honestly modeled logical surfaces, not a confirmed public REST catalog.
